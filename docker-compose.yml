services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      - REDIS_URL=redis://redis:6379/0
      - JOBS_DIR=/app/backend/jobs
      - PIPELINE_DIR=/app/pipeline
      - PIPELINE_PYTHON=python
      - NODE_BIN=node
      # Trader runs on the host (not in a container) and writes to the
      # project-root-relative paths below. The backend reads them via the
      # :ro bind mount defined in `volumes`.
      - BLOFIN_LOG_FILE=/host_trader/blofin_executor.log
      - BLOFIN_REPORTS_DIR=/host_trader/blofin_execution_reports
    volumes:
      - jobs_data:/app/backend/jobs
      - backend_data:/app/backend/data
      - /data:/data
      # Read-only view of the trader's working dir so the Manager API can
      # serve execution reports and the trader log stream.
      - /root/benji:/host_trader:ro
      # Writable host-shared data for the containerized trader copy
      # (backend/app/cli/trader_blofin.py). Mirrors celery's mount so
      # both services see the same pipeline artifacts + trader state.
      - /mnt/quant-data:/mnt/quant-data
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"

  celery:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      - REDIS_URL=redis://redis:6379/0
      - JOBS_DIR=/app/backend/jobs
      - PIPELINE_DIR=/app/pipeline
      - PIPELINE_PYTHON=python
      - NODE_BIN=node
      - BASE_DATA_DIR=/mnt/quant-data
      - DATA_ROOT=/mnt/quant-data
      - OVERLAP_SOURCE=db
      - MARKETCAP_DIR=/mnt/quant-data/raw/coingecko
    volumes:
      - jobs_data:/app/backend/jobs
      - /data:/data
      - /mnt/quant-data:/mnt/quant-data
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.workers.pipeline_worker.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

networks:
  default:
    name: benji_default
    external: true

volumes:
  redis_data:
  jobs_data:
  backend_data:
